    <circle cx="13" cy="26" r="8" fill="#c96442"/>
    <path d="M8 20 L13 26 L5 25 Z" fill="#1f1e1c"/>
    <circle cx="67" cy="26" r="8" fill="#c96442"/>
    <path d="M72 20 L67 26 L75 25 Z" fill="#1f1e1c"/>
    <!-- legs -->
    <g stroke="#c96442" stroke-width="2.5" stroke-linecap="round" fill="none">
