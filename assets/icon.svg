  <rect x="16" y="16" width="480" height="480" rx="112" fill="#1f1e1c"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="#3a3a37" stroke-width="8"/>

  <!-- crab, centered & scaled from the widget mascot -->
  <g transform="translate(256 268) scale(5.4) translate(-40 -38)">
