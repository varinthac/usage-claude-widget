    <ellipse cx="53" cy="42" rx="3.5" ry="2" fill="#eda78e" opacity="0.9"/>
    <!-- happy face -->
    <circle cx="33" cy="34" r="5.5" fill="#fff"/>
    <circle cx="47" cy="34" r="5.5" fill="#fff"/>
    <circle cx="33.5" cy="35" r="2.8" fill="#2a2a28"/>
    <circle cx="34.5" cy="34" r="0.9" fill="#fff"/>
    <circle cx="47.5" cy="35" r="2.8" fill="#2a2a28"/>
    <circle cx="48.5" cy="34" r="0.9" fill="#fff"/>
    <path d="M35 45 Q40 49.5 45 45" stroke="#2a2a28" stroke-width="2" fill="none" stroke-linecap="round"/>
